name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      - name: Setup iOS project
        run: |
          cp -r ios/fastlane /tmp/fb 2>/dev/null || true
          cp ios/ExportOptions.plist /tmp/eo.plist 2>/dev/null || true
          rm -rf ios/
          # Disable Flutter SPM integration globally (CocoaPods-only)
          flutter config --no-enable-swift-package-manager
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          cp -r /tmp/fb ios/fastlane 2>/dev/null || true
          cp /tmp/eo.plist ios/ExportOptions.plist 2>/dev/null || true
          sed -i '' 's/com.tilezhan.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          python3 -c "
          import base64, os, subprocess
          c = base64.b64decode(os.environ['CERT_B64'])
          k = base64.b64decode(os.environ['KEY_B64'])
          open('cert.pem', 'wb').write(c)
          open('key.pem', 'wb').write(k)
          subprocess.run(['security','delete-keychain','ci.keychain'], capture_output=True)
          subprocess.run(['security','create-keychain','-p','ci','ci.keychain'], check=True)
          subprocess.run(['security','unlock-keychain','-p','ci','ci.keychain'], check=True)
          subprocess.run(['security','import','cert.pem','-k','ci.keychain','-A'], check=True)
          subprocess.run(['security','import','key.pem','-k','ci.keychain','-A'], check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-s','-k','ci','ci.keychain'], check=True)
          subprocess.run(['security','list-keychains','-d','user','-s','ci.keychain','login.keychain'], check=True)
          print('OK')
          "
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan.mobileprovision

      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3' }

      - run: gem install fastlane -N

      - name: Build and upload
        working-directory: frontend/ios
        run: fastlane ios beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
