name: iOS TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get

      - name: Setup iOS
        run: |
          cp -r ios/fastlane /tmp/fb 2>/dev/null || true
          rm -rf ios/
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          cp -r /tmp/fb ios/fastlane 2>/dev/null || true
          sed -i '' 's/com.tilezhan.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Import cert
        run: |
          python3 -c "
          import base64,os,subprocess
          c=base64.b64decode(os.environ['CERT']);k=base64.b64decode(os.environ['KEY'])
          open('c.pem','wb').write(c);open('k.pem','wb').write(k)
          subprocess.run(['security','delete-keychain','ci.keychain'],capture_output=True)
          subprocess.run(['security','create-keychain','-p','p','ci.keychain'],check=True)
          subprocess.run(['security','unlock-keychain','-p','p','ci.keychain'],check=True)
          subprocess.run(['security','import','c.pem','-k','ci.keychain','-A'],check=True)
          subprocess.run(['security','import','k.pem','-k','ci.keychain','-A'],check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-s','-k','p','ci.keychain'],check=True)
          subprocess.run(['security','list-keychains','-d','user','-s','ci.keychain','login.keychain'],check=True)
          print('OK')"
        env:
          CERT: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY: ${{ secrets.APPLE_KEY_PEM_B64 }}

      - name: Install profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan.mobileprovision

      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3' }

      - name: Install Fastlane
        run: gem install fastlane -N

      - name: Build and upload
        run: cd ios && fastlane ios beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
