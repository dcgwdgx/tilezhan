name: iOS TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      # 1. Import certificate (PEM format - no P12 password issues)
      - name: Import cert
        run: |
          python3 -c "
          import base64, os, subprocess
          cert = base64.b64decode(os.environ['CERT_B64'])
          key = base64.b64decode(os.environ['KEY_B64'])
          with open('cert.pem','wb') as f: f.write(cert)
          with open('key.pem','wb') as f: f.write(key)
          subprocess.run(['security','create-keychain','-p','temp123','build.keychain'],check=True)
          subprocess.run(['security','default-keychain','-s','build.keychain'],check=True)
          subprocess.run(['security','unlock-keychain','-p','temp123','build.keychain'],check=True)
          subprocess.run(['security','import','cert.pem','-k','build.keychain','-A'],check=True)
          subprocess.run(['security','import','key.pem','-k','build.keychain','-A'],check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-s','-k','temp123','build.keychain'],check=True)
          os.remove('cert.pem'); os.remove('key.pem')
          subprocess.run(['security','find-identity','-v','-p','codesigning'])
          print('CERT OK')
          "
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}

      # 2. Install provisioning profile
      - name: Install profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan.mobileprovision

      # 3. Setup Fastlane
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.2' }

      - name: Install Fastlane
        run: |
          gem install fastlane -N
          cd ios && pod install && cd ..

      # 4. Build & upload via Fastlane
      - name: Build and upload
        run: fastlane ios beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
