<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <rect x="3" y="3" width="194" height="274" rx="12" fill="#F8F0E0"/>
  <rect x="6" y="6" width="188" height="268" rx="10" fill="#FDF8F0" stroke="#D4C8B0" stroke-width="1.5"/>
  <rect x="16" y="16" width="168" height="248" rx="6" fill="none" stroke="#E8DCC8" stroke-width="0.8"/>
  <!-- Stylized sparrow on bamboo branch — the iconic 1-sou design -->
  <g transform="translate(100,145)" fill="#1E8449">
    <!-- Branch -->
    <line x1="-55" y1="20" x2="55" y2="15" stroke="#1E8449" stroke-width="4" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="0" cy="-5" rx="18" ry="22"/>
    <!-- Head -->
    <circle cx="10" cy="-28" r="12"/>
    <!-- Eye -->
    <circle cx="13" cy="-30" r="2.5" fill="#FDF8F0"/>
    <!-- Beak -->
    <polygon points="22,-28 30,-26 22,-24" fill="#C0392B"/>
    <!-- Tail feathers -->
    <path d="M-18,-5 Q-40,-30 -35,-50" stroke="#1E8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-18,-2 Q-42,-20 -45,-40" stroke="#1E8449" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-16,3 Q-38,-12 -50,-25" stroke="#1E8449" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Wing -->
    <ellipse cx="-5" cy="-5" rx="14" ry="10" fill="#27AE60" transform="rotate(-10,-5,-5)"/>
    <!-- Legs -->
    <line x1="-5" y1="17" x2="-15" y2="22" stroke="#C0392B" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="17" x2="15" y2="22" stroke="#C0392B" stroke-width="2" stroke-linecap="round"/>
    <!-- Bamboo leaves on branch -->
    <path d="M30,5 Q45,-10 50,0" stroke="#1E8449" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M35,8 Q48,-5 55,5" stroke="#27AE60" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <text x="100" y="255" text-anchor="middle" font-family="serif" font-size="14" fill="#999">条</text>
  <text x="190" y="22" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="600" fill="#999">1s</text>
  <text x="14" y="268" text-anchor="start" font-family="sans-serif" font-size="9" fill="#CCC">1s</text>
</svg>
