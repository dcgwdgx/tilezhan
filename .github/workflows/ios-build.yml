name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      # ——— Install cert + profile ———
      - name: Setup code signing
        id: signing
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "temp123" build.keychain
          security list-keychains -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERT_B64" | base64 -d > cert.pem
          echo "$KEY_B64"  | base64 -d > key.pem
          security import cert.pem -k build.keychain -T /usr/bin/codesign -A
          security import key.pem  -k build.keychain -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain

          echo "$PROFILE_B64" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Use security cms to properly decode binary plist and extract UUID
          UUID=$(security cms -D -i profile.mobileprovision 2>/dev/null \
            | grep -A1 '<key>UUID</key>' | tail -1 \
            | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "profile_uuid=$UUID" >> $GITHUB_OUTPUT
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "✅ Signing ready (UUID=$UUID)"

      # ——— Build unsigned archive (Flutter handles everything except signing) ———
      - name: Build unsigned archive
        run: |
          flutter build ipa --release --build-number=${GITHUB_RUN_NUMBER} --no-codesign
          echo "✅ Archive built"

      # ——— Export signed IPA ———
      - name: Export signed IPA
        run: |
          # Verify installed profiles
          echo "Installed profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

          # Extract UUID properly via security cms
          PROFILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE" ]; then
            UUID=$(security cms -D -i "$PROFILE" 2>/dev/null | grep -A1 '<key>UUID</key>' | tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
            echo "Profile UUID from cms: $UUID"
          else
            echo "No profile files found!"
            ls ~/Library/MobileDevice/Provisioning\ Profiles/
            UUID=""
          fi

          cat > ExportOptions.plist << PLISTEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>74797U8R45</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.tilezhan.app</key>
                  <string>$UUID</string>
              </dict>
          </dict>
          </plist>
          PLISTEOF

          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist

          IPA=$(find build/ios/ipa -name "*.ipa" -print -quit)
          echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          echo "✅ IPA: $IPA"

      # ——— Upload ———
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --type ios
          echo "✅ Uploaded"

      - uses: actions/upload-artifact@v4
        with:
          name: tilezhan-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 30
