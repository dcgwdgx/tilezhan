workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tilezhan.app
        APP_STORE_ID: 6744609342
        XCODE_PROJECT: frontend/ios/Runner.xcodeproj
        XCODE_SCHEME: Runner
        XCODE_WORKSPACE: frontend/ios/Runner.xcworkspace
    scripts:
      - name: Setup
        script: |
          cd frontend
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          sed -i '' 's/com.example.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
      - name: Build iOS
        script: |
          cd frontend
          flutter build ios --release --no-codesign
      - name: Code sign
        script: |
          cd frontend
          codesign --sign "Apple Distribution" --force --deep --preserve-metadata \
            build/ios/Release-iphoneos/Runner.app
      - name: Create IPA
        script: |
          mkdir -p frontend/build/ios/ipa
          cd frontend/build/ios
          mkdir -p Payload
          cp -R Release-iphoneos/Runner.app Payload/
          zip -r ipa/Runner.ipa Payload
          rm -rf Payload
      - name: Publish to TestFlight
        script: |
          xcrun altool --upload-app \
            -f frontend/build/ios/ipa/Runner.ipa \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
    artifacts:
      - frontend/build/ios/ipa/*.ipa
