name: Frontend CI/CD

on:
  pull_request:
    paths: ['frontend/**']
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to stores?'
        type: boolean
        default: false

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24' }
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24' }
      - run: flutter pub get
      - run: flutter build appbundle --release
      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.tilezhan.app
          releaseFiles: frontend/build/app/outputs/bundle/release/app-release.aab
          track: internal

  build-ios:
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main' || github.event.inputs.deploy == 'true'
    runs-on: macos-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24' }
      - run: flutter pub get
      - uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_P12_PASSWORD }}
      - uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.tilezhan.app
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      - run: flutter build ipa --export-method app-store
      - uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: frontend/build/ios/ipa/tilezhan.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
