name: Frontend CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-ios:
    needs: analyze-and-test
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - name: Import signing cert + key (PEM)
        run: |
          python3 -c "
          import base64, os, subprocess
          # Decode cert and key from secrets
          cert_b64 = os.environ['CERT_B64']
          key_b64 = os.environ['KEY_B64']
          with open('cert.pem','wb') as f: f.write(base64.b64decode(cert_b64))
          with open('key.pem','wb') as f: f.write(base64.b64decode(key_b64))
          # Create keychain and import
          subprocess.run(['security','create-keychain','-p','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','unlock-keychain','-p','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','import','cert.pem','-k','signing_temp.keychain','-A','-T','/usr/bin/codesign'],check=True)
          subprocess.run(['security','import','key.pem','-k','signing_temp.keychain','-A','-T','/usr/bin/codesign'],check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-k','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','list-keychains','-d','user','-s','signing_temp.keychain','login.keychain'],check=True)
          os.remove('cert.pem'); os.remove('key.pem')
          # Verify
          r = subprocess.run(['security','find-identity','-v','-p','codesigning','signing_temp.keychain'], capture_output=True, text=True)
          print(r.stdout[:300])
          print('CERT OK')
          "
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
      - name: Install provisioning profile (Python)
        run: |
          python3 -c "
          import base64, os
          b64 = os.environ['PROFILE_B64']
          dest = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          os.makedirs(dest, exist_ok=True)
          with open(os.path.join(dest, 'tilezhan_appstore.mobileprovision'), 'wb') as f:
              f.write(base64.b64decode(b64))
          print('Profile installed')
          "
        env:
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      - run: flutter build ipa --release
      - uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
