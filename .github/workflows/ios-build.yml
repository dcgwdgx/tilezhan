name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      # ——— Recreate iOS project ———
      - name: Setup iOS project
        run: |
          cp ios/ExportOptions.plist /tmp/eo.plist 2>/dev/null || true
          rm -rf ios/
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          cp /tmp/eo.plist ios/ExportOptions.plist 2>/dev/null || true

          # Fix bundle ID, team, and set manual signing per-target via Python
          python3 -c "
          import re
          with open('ios/Runner.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          content = content.replace('com.tilezhan.tilezhan', 'com.tilezhan.app')
          content = re.sub(r'DEVELOPMENT_TEAM\s*=\s*\"[^\"]*\"', 'DEVELOPMENT_TEAM = \"74797U8R45\"', content)
          # Per-target manual signing: only Runner target gets these, SPM targets keep automatic
          content = re.sub(r'CODE_SIGN_STYLE\s*=\s*[^;]+;', 'CODE_SIGN_STYLE = Manual;', content)
          content = re.sub(r'CODE_SIGN_IDENTITY\s*=\s*\"[^\"]*\"', 'CODE_SIGN_IDENTITY = \"Apple Distribution\";', content)
          # Add PROVISIONING_PROFILE_SPECIFIER after each CODE_SIGN_IDENTITY
          content = re.sub(
              r'(CODE_SIGN_IDENTITY = \"Apple Distribution\";)',
              r'\\1\\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"TileZhan App Store\";',
              content
          )
          with open('ios/Runner.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('✅ pbxproj updated')
          "

      # ——— Code signing (cedvdb pattern: default-keychain + -T codesign) ———
      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "ci" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

          echo "$CERT_B64" | base64 -d > cert.pem
          echo "$KEY_B64"  | base64 -d > key.pem
          security import cert.pem -k build.keychain -T /usr/bin/codesign -T /usr/bin/xcodebuild -A
          security import key.pem  -k build.keychain -T /usr/bin/codesign -T /usr/bin/xcodebuild -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" build.keychain

          echo "$PROFILE_B64" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan.mobileprovision

          echo "✅ Keychain ready"
          security find-identity -v -p codesigning build.keychain

      # ——— Build IPA ———
      # Manual signing via project.pbxproj (per-target) + ExportOptions.plist (export).
      # SPM packages use default automatic signing → no provisioning conflict.
      - name: Build IPA
        run: |
          flutter build ipa --release --build-number=${GITHUB_RUN_NUMBER} --export-options-plist=ios/ExportOptions.plist
          IPA=$(find build/ios/ipa -name "*.ipa" -print -quit)
          echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          echo "✅ IPA: $IPA"

      # ——— Upload ———
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --type ios
          echo "✅ Uploaded"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilezhan-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 30
