workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tilezhan.app
    scripts:
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Install signing files
        script: |
          keychain initialize
          app-store-connect use-signing-files
      - name: Set up iOS project
        script: |
          cd frontend
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/com.example.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
      - name: Build IPA
        script: |
          cd frontend
          flutter build ipa --release
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
