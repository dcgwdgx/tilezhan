workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: frontend
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
      cancel_previous_builds: true
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - appstore
        - ios_signing
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Import signing assets
        script: |
          echo "$P12_BASE64" | base64 -d > /tmp/cert.p12
          echo "$PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision
          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          security import /tmp/cert.p12 -k build.keychain -A
          security set-key-partition-list -S apple-tool:,apple: -s -k temp123 build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build and upload
        script: |
          export APP_STORE_CONNECT_API_KEY_ID="$APP_STORE_CONNECT_KEY_ID"
          export APP_STORE_CONNECT_API_ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"
          gem install fastlane -N
          cd ios
          fastlane ios beta
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
