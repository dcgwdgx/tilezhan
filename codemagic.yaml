workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    working_directory: frontend
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
      cancel_previous_builds: true
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - appstore
        - ios_signing
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Setup Podfile
        script: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'
          use_frameworks!
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_PACKAGE_MANAGER'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ""
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF
      - name: Install Pods
        script: cd ios && pod install
      - name: Import signing assets
        script: |
          echo "$P12_BASE64" | base64 -d > /tmp/cert.p12
          echo "$PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision
          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          security import /tmp/cert.p12 -k build.keychain -A
          security set-key-partition-list -S apple-tool:,apple: -s -k temp123 build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Build and upload
        script: |
          export APP_STORE_CONNECT_API_KEY_ID="$APP_STORE_CONNECT_KEY_ID"
          export APP_STORE_CONNECT_API_ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"
          gem install fastlane -N
          cd ios
          fastlane ios beta
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
