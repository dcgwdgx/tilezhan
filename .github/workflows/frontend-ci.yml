name: Frontend CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-ios:
    needs: analyze-and-test
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - name: Import signing cert
        run: |
          echo "$APPLE_P12_BASE64" | base64 -d > signing.p12
          security create-keychain -p "" signing_temp.keychain
          security unlock-keychain -p "" signing_temp.keychain
          security import signing.p12 -k signing_temp.keychain -f pkcs12 -A -P ""
          security set-key-partition-list -S apple-tool:,apple: -s -k "" signing_temp.keychain
          security list-keychains -d user -s signing_temp.keychain login.keychain
          security default-keychain -s signing_temp.keychain
          rm signing.p12
        env:
          APPLE_P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
      - run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan_appstore.mobileprovision
      - run: flutter build ipa --release
      - uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
