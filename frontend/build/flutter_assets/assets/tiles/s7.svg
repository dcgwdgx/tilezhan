<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <rect x="3" y="3" width="194" height="274" rx="12" fill="#F8F0E0"/>
  <rect x="6" y="6" width="188" height="268" rx="10" fill="#FDF8F0" stroke="#D4C8B0" stroke-width="1.5"/>
  <rect x="16" y="16" width="168" height="248" rx="6" fill="none" stroke="#E8DCC8" stroke-width="0.8"/>
  <!-- 7-sou: 3 top + 1 center (red band in riichi) + 3 bottom -->
  <!-- Top row: 3 sticks -->
  <line x1="70" y1="90" x2="70" y2="155" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="100" y2="155" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="90" x2="130" y2="155" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <!-- Center stick with red band -->
  <line x1="100" y1="158" x2="100" y2="200" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <rect x="93" y="172" width="14" height="8" rx="2" fill="#C0392B"/>
  <!-- Bottom row: 3 sticks -->
  <line x1="70" y1="203" x2="70" y2="230" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <line x1="100" y1="203" x2="100" y2="230" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <line x1="130" y1="203" x2="130" y2="230" stroke="#1E8449" stroke-width="8" stroke-linecap="round"/>
  <text x="100" y="255" text-anchor="middle" font-family="serif" font-size="14" fill="#999">条</text>
  <text x="190" y="22" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="600" fill="#999">7s</text>
  <text x="14" y="268" text-anchor="start" font-family="sans-serif" font-size="9" fill="#CCC">7s</text>
</svg>
