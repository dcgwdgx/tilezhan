name: Frontend CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-ios:
    needs: analyze-and-test
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get
      - name: Import signing cert (Python)
        run: |
          python3 -c "
          import base64, os, subprocess
          with open('signing.p12','wb') as f:
              f.write(base64.b64decode(os.environ['P12_B64']))
          subprocess.run(['security','create-keychain','-p','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','unlock-keychain','-p','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','import','signing.p12','-k','signing_temp.keychain','-f','pkcs12','-A','-T','/usr/bin/codesign','-T','/usr/bin/security','-P',''],check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-k','temp123','signing_temp.keychain'],check=True)
          subprocess.run(['security','list-keychains','-d','user','-s','signing_temp.keychain','login.keychain'],check=True)
          subprocess.run(['security','default-keychain','-s','signing_temp.keychain'],check=True)
          os.remove('signing.p12')
          print('CERT OK')
          "
        env:
          P12_B64: ${{ secrets.APPLE_P12_BASE64 }}
      - run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/tilezhan_appstore.mobileprovision
      - run: flutter build ipa --release
      - uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
