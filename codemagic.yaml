workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tilezhan.app
        APP_STORE_ID: 6744609342
    scripts:
      - name: Set up iOS project
        script: |
          cd frontend
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/com.example.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
      - name: Run tests
        script: |
          cd frontend
          flutter test --no-pub || true
      - name: Build IPA
        script: |
          cd frontend
          flutter build ipa --release
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
