name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      # ——— In-place project config (no rm -rf ios/) ———
      - name: Configure Xcode project
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = ".*";/DEVELOPMENT_TEAM = "74797U8R45";/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = com.tilezhan.app;/' ios/Runner.xcodeproj/project.pbxproj

      # ——— PEM cert import (proven compatible with macOS security) ———
      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          security create-keychain -p "temp123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERT_B64" | base64 -d > cert.pem
          echo "$KEY_B64"  | base64 -d > key.pem
          security import cert.pem -k build.keychain -T /usr/bin/codesign -A
          security import key.pem  -k build.keychain -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain

          echo "$PROFILE_B64" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 'UUID' profile.mobileprovision | grep -oE '[-A-Z0-9]{36}' | head -1)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "✅ Keychain ready (UUID=$UUID)"
          security find-identity -v -p codesigning build.keychain

      # ——— Build with automatic signing ———
      - name: Build IPA
        run: |
          flutter build ipa --release --build-number=${GITHUB_RUN_NUMBER}
          IPA=$(find build/ios/ipa -name "*.ipa" -print -quit)
          echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          echo "✅ IPA: $IPA"

      # ——— Upload via altool ———
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --type ios
          echo "✅ Uploaded"

      - uses: actions/upload-artifact@v4
        with:
          name: tilezhan-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 30
