<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 768"><rect width="512" height="768" fill="#0A0F14"/><text x="256" y="200" text-anchor="middle" font-size="100">рҹ«ӣ</text><text x="256" y="320" text-anchor="middle" font-size="28" font-weight="800" fill="#F5F0E8" font-family="Poppins,sans-serif">The Slanted Peapod</text><text x="256" y="360" text-anchor="middle" font-size="15" font-weight="600" fill="#3498DB" font-family="Poppins,sans-serif">3 peas in a pod.</text><text x="256" y="700" text-anchor="middle" font-size="13" fill="#8A847C" font-family="Noto Serif SC,serif">еҜ№и§’зәҝеҖҫж–ңжҺ’еҲ—вҶ’иұҢиұҶиҚҡйҮҢ3йў—иұҢиұҶ</text><rect x="230" y="40" width="52" height="24" rx="12" fill="#3498DB" opacity="0.2"/><text x="256" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#3498DB" font-family="Poppins,sans-serif">P3</text></svg>