name: Frontend CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.4', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-ios:
    needs: analyze-and-test
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.4', channel: stable, cache: true }
      - run: flutter pub get

      - name: Setup iOS project
        run: flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .

      - name: Install Apple Distribution Certificate
        run: |
          set -x
          python3 -c "
          import base64, os, subprocess
          b64 = os.environ['P12_B64'].strip()
          pwd = os.environ['P12_PWD'].strip()
          print(f'Base64 length: {len(b64)}')
          print(f'Password length: {len(pwd)}')
          print(f'Password repr: {repr(pwd)}')
          data = base64.b64decode(b64)
          print(f'Decoded bytes: {len(data)}')
          with open('signing_cert.p12', 'wb') as f:
              f.write(data)
          r = subprocess.run(['openssl','pkcs12','-in','signing_cert.p12','-passin',f'pass:{pwd}','-noout','-passout','pass:test123'], capture_output=True, text=True)
          print(f'openssl verify stdout: {r.stdout}')
          print(f'openssl verify stderr: {r.stderr}')
          if r.returncode != 0:
              print(f'P12 verification FAILED with returncode {r.returncode}')
              exit(1)
          print('P12 verified OK')
          "
        env:
          P12_B64: ${{ secrets.APPLE_P12_BASE64 }}
          P12_PWD: ${{ secrets.APPLE_P12_PASSWORD }}

      - name: Import cert to keychain
        run: |
          security create-keychain -p temp123 signing_temp.keychain
          security set-keychain-settings -lut 21600 signing_temp.keychain
          security unlock-keychain -p temp123 signing_temp.keychain
          security import signing_cert.p12 -k signing_temp.keychain -f pkcs12 -A -T /usr/bin/codesign -T /usr/bin/security -P "${{ secrets.APPLE_P12_PASSWORD }}"
          security set-key-partition-list -S apple-tool:,apple: -k temp123 signing_temp.keychain
          security list-keychains -d user -s signing_temp.keychain login.keychain
          rm signing_cert.p12
          echo "Certificate imported"

      - name: Install Provisioning Profile
        run: |
          python3 -c "
          import base64, os
          b64 = os.environ['PROFILE_B64']
          os.makedirs(os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles'), exist_ok=True)
          path = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles/tilezhan.mobileprovision')
          with open(path, 'wb') as f:
              f.write(base64.b64decode(b64))
          print('Provisioning profile installed')
          "
        env:
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

      - name: Force iOS 13.0
        run: |
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/platform :ios, '10.0'/platform :ios, '13.0'/g" ios/Podfile 2>/dev/null || true
          sed -i '' 's/platform :ios, "10.0"/platform :ios, "13.0"/g' ios/Podfile 2>/dev/null || true

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tilezhan.app</key>
              <string>TileZhan App Store</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

      - name: Clean & Reset
        run: |
          flutter clean
          flutter pub get
          cd ios && rm -rf Pods Podfile.lock && pod install --repo-update && cd ..

      - name: Build & Export IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilezhan-testflight-ipa
          path: build/ios/ipa/*.ipa
