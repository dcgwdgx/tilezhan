workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tilezhan.app
        APP_STORE_ID: 6744609342
    scripts:
      - name: Set up code signing
        script: |
          echo "DEVELOPMENT_TEAM=74797U8R45" >> frontend/ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_STYLE=Manual" >> frontend/ios/Flutter/Release.xcconfig
      - name: Install dependencies
        script: |
          cd frontend
          flutter pub get
      - name: Run tests
        script: |
          cd frontend
          flutter test --no-pub || true
      - name: Build IPA
        script: |
          cd frontend
          flutter build ipa --release
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
