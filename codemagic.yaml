workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.44.1
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tilezhan.app
    scripts:
      - name: Setup
        script: |
          cd frontend
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          sed -i '' 's/com.example.tilezhan/com.tilezhan.app/g' ios/Runner.xcodeproj/project.pbxproj
          flutter pub get
      - name: Create export options
        script: |
          cat > frontend/ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
          </dict>
          </plist>
          EOF
      - name: Build IPA
        script: |
          cd frontend
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
