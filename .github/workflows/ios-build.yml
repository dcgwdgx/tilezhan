name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14              # Intel runner, stable keychain CLI
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }

      - run: flutter pub get

      # ——— Recreate iOS project ———
      - name: Setup iOS project
        run: |
          rm -rf ios/
          flutter create --platforms=ios --org com.tilezhan --project-name tilezhan .
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com.tilezhan.tilezhan;/PRODUCT_BUNDLE_IDENTIFIER = com.tilezhan.app;/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 74797U8R45;/g' \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ".*";/DEVELOPMENT_TEAM = "74797U8R45";/g' \
            ios/Runner.xcodeproj/project.pbxproj

      # ——— Code signing with PEM certs ———
      - name: Import signing certificate
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_PEM_B64 }}
          KEY_B64: ${{ secrets.APPLE_KEY_PEM_B64 }}
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          # Build keychain, ADD to search list (keep login.keychain!)
          security create-keychain -p "ci" build.keychain
          security unlock-keychain -p "ci" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          # Import PEM cert + key
          echo "$CERT_B64" | base64 -d > cert.pem
          echo "$KEY_B64"  | base64 -d > key.pem
          security import cert.pem -k build.keychain -A
          security import key.pem  -k build.keychain -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" build.keychain

          # Verify cert is usable
          security find-identity -v -p codesigning build.keychain

          # Install provisioning profile (decode plist for UUID)
          echo "$PROFILE_B64" | base64 -d > profile.mobileprovision
          UUID=$(security cms -D -i profile.mobileprovision 2>/dev/null \
            | plutil -extract UUID raw - - 2>/dev/null)
          if [ -z "$UUID" ]; then
            # Fallback: try grep on raw file
            UUID=$(grep -a -A1 'UUID' profile.mobileprovision | grep -io '[a-f0-9]\{8\}-[a-f0-9]\{4\}-[a-f0-9]\{4\}-[a-f0-9]\{4\}-[a-f0-9]\{12\}' | head -1)
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "✅ Keychain ready (UUID=$UUID)"

      # ——— Build IPA (automatic signing — no xcargs, no ExportOptions.plist) ———
      - name: Build IPA
        run: |
          flutter build ipa --release --build-number=${GITHUB_RUN_NUMBER}
          IPA=$(find build/ios/ipa -name "*.ipa" -print -quit)
          echo "IPA_PATH=$IPA" >> $GITHUB_ENV
          echo "✅ IPA: $IPA"

      # ——— Upload via Apple native tool (zero Ruby/Fastlane deps) ———
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --type ios
          echo "✅ Uploaded to TestFlight"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilezhan-ipa
          path: ${{ env.IPA_PATH }}
          retention-days: 30
