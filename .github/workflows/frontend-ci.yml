name: Frontend CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.4', channel: stable, cache: true }
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  build-ios:
    needs: analyze-and-test
    runs-on: macos-14
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.24.4', channel: stable, cache: true }
      - run: flutter pub get


      - name: Install Apple Distribution Certificate
        run: |
          python3 << 'PYEOF'
          import base64, os, subprocess
          b64 = os.environ['P12_B64'].strip()
          pwd = os.environ['P12_PWD'].strip()
          print(f'B64 length: {len(b64)}, PWD: len={len(pwd)} repr={repr(pwd)}')
          data = base64.b64decode(b64)
          print(f'Decoded: {len(data)} bytes')
          with open('signing_cert.p12', 'wb') as f:
              f.write(data)
          # Extract cert and key separately (avoid P12 MAC issue on macOS)
          subprocess.run(['openssl','pkcs12','-in','signing_cert.p12','-passin',f'pass:{pwd}','-clcerts','-nokeys','-out','cert.pem'], check=True)
          subprocess.run(['openssl','pkcs12','-in','signing_cert.p12','-passin',f'pass:{pwd}','-nocerts','-nodes','-out','key.pem'], check=True)
          # Import cert and key
          subprocess.run(['security','create-keychain','-p','temp123','signing_temp.keychain'], check=True)
          subprocess.run(['security','unlock-keychain','-p','temp123','signing_temp.keychain'], check=True)
          subprocess.run(['security','import','cert.pem','-k','signing_temp.keychain','-A','-T','/usr/bin/codesign'], check=True)
          subprocess.run(['security','import','key.pem','-k','signing_temp.keychain','-A','-T','/usr/bin/codesign'], check=True)
          subprocess.run(['security','set-key-partition-list','-S','apple-tool:,apple:','-k','temp123','signing_temp.keychain'], check=True)
          subprocess.run(['security','list-keychains','-d','user','-s','signing_temp.keychain','login.keychain'], check=True)
          os.remove('signing_cert.p12')
          os.remove('cert.pem')
          os.remove('key.pem')
          # Verify and activate
          r = subprocess.run(['security','find-identity','-v','-p','codesigning','signing_temp.keychain'], capture_output=True, text=True)
          print(f'Identities: {r.stdout[:300]}')
          # Also import dev cert
          dev_b64 = os.environ['DEV_P12_B64']
          with open('dev_cert.p12','wb') as f: f.write(base64.b64decode(dev_b64))
          subprocess.run(['openssl','pkcs12','-in','dev_cert.p12','-passin',f'pass:{pwd}','-clcerts','-nokeys','-out','dev_cert.pem'], check=True)
          subprocess.run(['security','import','dev_cert.pem','-k','signing_temp.keychain','-A'], check=True)
          os.remove('dev_cert.p12'); os.remove('dev_cert.pem')
          r = subprocess.run(['security','find-identity','-v','-p','codesigning','signing_temp.keychain'], capture_output=True, text=True)
          print(f'Identities: {r.stdout[:500]}')
          print('CERTS IMPORTED')
          PYEOF
        env:
          P12_B64: ${{ secrets.APPLE_P12_BASE64 }}
          P12_PWD: ${{ secrets.APPLE_P12_PASSWORD }}
          DEV_P12_B64: ${{ secrets.APPLE_DEV_P12_BASE64 }}

      - name: Activate keychain for Xcode
        run: |
          security list-keychains -d user -s signing_temp.keychain login.keychain
          security default-keychain -s signing_temp.keychain
          security find-identity -v -p codesigning

      - name: Install Provisioning Profiles
        run: |
          python3 -c "
          import base64, os
          dest = os.path.expanduser('~/Library/MobileDevice/Provisioning Profiles')
          os.makedirs(dest, exist_ok=True)
          for name, secret_key in [('tilezhan_appstore.mobileprovision', 'PROFILE_B64'), ('tilezhan_dev.mobileprovision', 'DEV_PROFILE_B64')]:
              b64 = os.environ[secret_key]
              with open(os.path.join(dest, name), 'wb') as f:
                  f.write(base64.b64decode(b64))
          print('Both profiles installed')
          "
        env:
          PROFILE_B64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          DEV_PROFILE_B64: ${{ secrets.BUILD_DEV_PROFILE_BASE64 }}

      - name: Create ExportOptions.plist
        run: |
          cat > ios/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.tilezhan.app</key>
              <string>TileZhan App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}" >> ios/Flutter/Release.xcconfig

      - name: Build iOS (no-sign)
        run: flutter build ios --release --no-codesign

      - name: Build IPA (signed) & Upload
        run: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -configuration Release -archivePath ../build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="TileZhan App Store" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates
          xcodebuild -exportArchive \
            -archivePath ../build/ios/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ../build/ios/ipa
          ls ../build/ios/ipa/

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilezhan-testflight-ipa
          path: build/ios/ipa/*.ipa
