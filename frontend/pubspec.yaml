name: tilezhan
description: Master Mahjong, One Tile at a Time.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  hive_flutter: ^1.1.0
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_analytics: ^10.10.5
  firebase_crashlytics: ^3.5.5
  firebase_remote_config: ^4.4.5
  purchases_flutter: ^6.30.0
  flame: ^1.17.0
  rive: ^0.13.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  ntp: ^2.0.0
  encrypt: ^5.0.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/tiles/
    - assets/mnemonic/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/
