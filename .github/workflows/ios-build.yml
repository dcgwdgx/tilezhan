name: iOS TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.44.1', channel: stable, cache: true }
      - run: flutter pub get

      - name: Import signing cert (P12)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: com.tilezhan.app
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Set development team
        run: sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = 74797U8R45;/g' ios/Runner.xcodeproj/project.pbxproj || true

      - name: Build IPA
        run: flutter build ipa --release --build-number=${{ github.run_number }}

      - name: Upload to TestFlight
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID" \
            --apiKeyFile /dev/stdin <<< "$APPSTORE_PRIVATE_KEY"
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
